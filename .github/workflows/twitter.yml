name: "🐦 دانلود از توییتر"

on:
  workflow_dispatch:
    inputs:
      tweet_url:
        description: 'لینک کامل توییت (مثلاً https://x.com/username/status/123...)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کدهای ریپازیتوری
        uses: actions/checkout@v3

      - name: نصب پایتون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: نصب نیازمندی‌ها
        run: pip install requests

      - name: اجرای اسکریپت
        run: python twitter_scraper.py "${{ github.event.inputs.tweet_url }}"

      - name: ذخیره‌سازی تغییرات در ریپو
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add twitter data for ${{ github.event.inputs.tweet_url }}" && git push)
