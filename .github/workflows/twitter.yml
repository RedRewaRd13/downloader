name: "🐦 Twitter Downloader"

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'نام کاربری توییتر (بدون @)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کدهای ریپازیتوری
        uses: actions/checkout@v3

      - name: نصب پایتون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: نصب ابزارهای مورد نیاز
        run: pip install snscrape requests

      - name: اجرای اسکریپت
        run: python twitter_scraper.py "${{ github.event.inputs.username }}"

      - name: ذخیره‌سازی تغییرات در ریپو
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add twitter data for @${{ github.event.inputs.username }}" && git push)
