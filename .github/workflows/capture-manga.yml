name: 📖 MangaDex Chapter Download (API)
on:
  workflow_dispatch:
    inputs:
      chapter_url:
        description: 'لینک چپتر (مثلاً https://mangadex.org/chapter/...)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: دریافت اطلاعات چپتر از API و دانلود
        env:
          CHAPTER_URL: ${{ github.event.inputs.chapter_url }}
        run: |
          # استخراج UUID از لینک (همون رشته آخر)
          CHAPTER_ID=$(echo "$CHAPTER_URL" | awk -F/ '{print $NF}')
          echo "Chapter ID: $CHAPTER_ID"

          # گرفت اطلاعات از API
          API_URL="https://api.mangadex.org/chapter/$CHAPTER_ID"
          echo "Fetching: $API_URL"
          RESPONSE=$(curl -s "$API_URL")
          HASH=$(echo "$RESPONSE" | jq -r '.data.attributes.hash')
          PAGES=$(echo "$RESPONSE" | jq -r '.data.attributes.data[]')
          CHAPTER_TITLE=$(echo "$RESPONSE" | jq -r '.data.attributes.title // "untitled"')

          if [ -z "$HASH" ] || [ "$HASH" = "null" ]; then
            echo "❌ Could not fetch chapter info. Check URL or API access."
            exit 1
          fi

          echo "Chapter title: $CHAPTER_TITLE"
          echo "Number of pages: $(echo "$PAGES" | wc -l)"

          # ساخت پوشه خروجی
          FOLDER="manga_captures/$(echo "$CHAPTER_ID" | cut -c1-8)_$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$FOLDER"

          PAGE_NUM=0
          echo "$PAGES" | while read -r PAGE; do
            PAGE_NUM=$((PAGE_NUM + 1))
            PAD_NUM=$(printf "%03d" $PAGE_NUM)
            IMAGE_URL="https://uploads.mangadex.org/data/$HASH/$PAGE"
            echo "Downloading page $PAGE_NUM: $IMAGE_URL"
            curl -L --retry 2 --max-time 30 -o "$FOLDER/page_$PAD_NUM.jpg" "$IMAGE_URL"
          done

          echo "🎉 Done. Files saved in $FOLDER"

          # ذخیره مسیر پوشه برای کامیت
          echo "FOLDER=$FOLDER" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manga_captures/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Download chapter via API [skip ci]"
          git pull --rebase
          git push
