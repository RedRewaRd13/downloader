name: 📖 Capture Manga Chapter (MangaDex)
on:
  workflow_dispatch:
    inputs:
      chapter_url:
        description: 'آدرس فصل (با Long Strip هم فرقی نمی‌کنه، خودکار درست می‌شه)'
        required: true

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Run capture script
        env:
          INPUT_URL: ${{ github.event.inputs.chapter_url }}
        run: |
          cat > capture.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            let rawUrl = process.env.INPUT_URL.trim();
            if (!rawUrl.startsWith('http')) {
              rawUrl = 'https://' + rawUrl;
            }
            if (!rawUrl.includes('style=long-strip')) {
              rawUrl += (rawUrl.includes('?') ? '&' : '?') + 'style=long-strip';
            }
            console.log('Final URL:', rawUrl);

            const browser = await puppeteer.launch({
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu'
              ]
            });
            const page = await browser.newPage();
            await page.setUserAgent(
              'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            );
            await page.setViewport({ width: 800, height: 1000 });

            console.log('Navigating...');
            await page.goto(rawUrl, { waitUntil: 'networkidle2', timeout: 120000 });
            await page.waitForTimeout(3000);

            // Smooth scroll
            await page.evaluate(async () => {
              await new Promise(resolve => {
                let total = 0;
                const dist = 300;
                const timer = setInterval(() => {
                  window.scrollBy(0, dist);
                  total += dist;
                  if (total >= document.body.scrollHeight) {
                    clearInterval(timer);
                    resolve();
                  }
                }, 400);
              });
            });
            await page.waitForTimeout(5000);

            // Extract image URLs (try multiple selectors)
            let imgUrls = await page.evaluate(() => {
              const imgs = document.querySelectorAll('img[src*="uploads.mangadex.org"]');
              return Array.from(imgs).map(img => img.src);
            });
            if (imgUrls.length === 0) {
              // fallback: images with data-src
              imgUrls = await page.evaluate(() => {
                const imgs = document.querySelectorAll('img[data-src*="uploads.mangadex.org"]');
                return Array.from(imgs).map(img => img.dataset.src);
              });
            }
            if (imgUrls.length === 0) {
              console.error('No images found. Page HTML snippet:');
              const snippet = await page.evaluate(() => document.body.innerHTML.substring(0,500));
              console.error(snippet);
              process.exit(1);
            }
            console.log('Found', imgUrls.length, 'images');

            // Prepare output folder
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').substring(0,19);
            const slug = rawUrl.replace(/[^a-zA-Z0-9]/g, '_').substring(0,60);
            const saveDir = 'manga_captures/' + slug + '_' + timestamp;
            fs.mkdirSync(saveDir, { recursive: true });

            // Download each page
            for (let i = 0; i < imgUrls.length; i++) {
              const imgPage = await browser.newPage();
              await imgPage.setUserAgent(
                'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
              );
              await imgPage.setExtraHTTPHeaders({ Referer: 'https://mangadex.org/' });
              console.log(`Downloading ${i+1}/${imgUrls.length}`);
              try {
                const response = await imgPage.goto(imgUrls[i], { timeout: 60000 });
                const buffer = await response.buffer();
                const filename = 'page_' + String(i+1).padStart(3,'0') + '.jpg';
                fs.writeFileSync(saveDir + '/' + filename, buffer);
                console.log('  OK:', filename);
              } catch (err) {
                console.error('  FAILED:', err.message);
              } finally {
                await imgPage.close();
              }
            }
            await browser.close();
            console.log('Done. Files in', saveDir);
          })();
          EOF
          node capture.js

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manga_captures/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Capture manga chapter [skip ci]"
          git pull --rebase
          git push
