name: 📖 Capture Manga Chapter (Paged Mode)
on:
  workflow_dispatch:
    inputs:
      chapter_url:
        description: 'آدرس فصل (نیازی به long-strip نیست)'
        required: true

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Run paged capture script
        env:
          INPUT_URL: ${{ github.event.inputs.chapter_url }}
        run: |
          cat > capture.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

          (async () => {
            let rawUrl = process.env.INPUT_URL.trim();
            if (!rawUrl.startsWith('http')) {
              rawUrl = 'https://' + rawUrl;
            }
            console.log('Final URL:', rawUrl);

            const browser = await puppeteer.launch({
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu'
              ]
            });
            const page = await browser.newPage();
            await page.setUserAgent(
              'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            );
            await page.setViewport({ width: 800, height: 1000 });

            // برو به صفحه چپتر
            await page.goto(rawUrl, { waitUntil: 'networkidle2', timeout: 120000 });

            // صبر کن تا اولین عکس مانگا بیاد
            try {
              await page.waitForSelector('img[src*="uploads.mangadex.org"]', { timeout: 30000 });
              console.log('Reader loaded.');
            } catch (e) {
              console.error('Reader did not load. Exiting.');
              process.exit(1);
            }

            // آماده‌سازی پوشه
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').substring(0,19);
            const slug = rawUrl.replace(/[^a-zA-Z0-9]/g, '_').substring(0,60);
            const saveDir = 'manga_captures/' + slug + '_' + timestamp;
            fs.mkdirSync(saveDir, { recursive: true });

            let pageNum = 0;
            let lastImageUrl = '';

            while (true) {
              // عکس فعلی رو پیدا کن
              const currentImgUrl = await page.evaluate(() => {
                const img = document.querySelector('img[src*="uploads.mangadex.org"]');
                return img ? img.src : null;
              });

              if (!currentImgUrl) {
                console.log('No more images found. End of chapter.');
                break;
              }

              // اگر همون عکس قبلی بود، یعنی تغییر نکرده → احتمالاً به آخر رسیدیم
              if (currentImgUrl === lastImageUrl) {
                console.log('Image did not change after page turn. Stopping.');
                break;
              }

              lastImageUrl = currentImgUrl;
              pageNum++;
              console.log(`Page ${pageNum}: ${currentImgUrl}`);

              // دانلود عکس فعلی
              const imgPage = await browser.newPage();
              await imgPage.setUserAgent(page.browser().userAgent());
              await imgPage.setExtraHTTPHeaders({ Referer: 'https://mangadex.org/' });
              try {
                const response = await imgPage.goto(currentImgUrl, { timeout: 60000 });
                const buffer = await response.buffer();
                const filename = 'page_' + String(pageNum).padStart(3, '0') + '.jpg';
                fs.writeFileSync(saveDir + '/' + filename, buffer);
                console.log('  ✔ ' + filename);
              } catch (err) {
                console.error('  ✖ Download failed:', err.message);
              } finally {
                await imgPage.close();
              }

              // برو به صفحه بعد: کلید Arrow Right
              await page.keyboard.press('ArrowRight');
              // صبر کن تا عکس بعدی لود بشه
              await wait(2000);   // 2 ثانیه صبر، می‌تونی بیشتر کنی
            }

            await browser.close();
            console.log('Done. Files in', saveDir);
          })();
          EOF
          node capture.js

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manga_captures/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Capture manga chapter (paged) [skip ci]"
          git pull --rebase
          git push
