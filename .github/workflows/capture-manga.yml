name: 📖 Capture Manga Chapter (Paged Mode)
on:
  workflow_dispatch:
    inputs:
      chapter_url:
        description: 'آدرس فصل (نیازی به long-strip نیست)'
        required: true

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Run paged capture script
        env:
          INPUT_URL: ${{ github.event.inputs.chapter_url }}
        run: |
          cat > capture.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

          (async () => {
            let rawUrl = process.env.INPUT_URL.trim();
            if (!rawUrl.startsWith('http')) {
              rawUrl = 'https://' + rawUrl;
            }
            console.log('Final URL:', rawUrl);

            const browser = await puppeteer.launch({
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu'
              ]
            });
            const page = await browser.newPage();
            await page.setUserAgent(
              'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            );
            await page.setViewport({ width: 800, height: 1000 });

            await page.goto(rawUrl, { waitUntil: 'networkidle2', timeout: 120000 });

            // صبر کن تا حداقل یک عکس ظاهر بشه
            try {
              await page.waitForSelector('img[src*="uploads.mangadex.org"]', { timeout: 30000 });
              console.log('Reader loaded.');
            } catch (e) {
              console.error('Reader did not load. Exiting.');
              process.exit(1);
            }

            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').substring(0,19);
            const slug = rawUrl.replace(/[^a-zA-Z0-9]/g, '_').substring(0,60);
            const saveDir = 'manga_captures/' + slug + '_' + timestamp;
            fs.mkdirSync(saveDir, { recursive: true });

            const downloaded = new Set(); // ذخیره عکس‌هایی که قبلاً دانلود کردیم
            let previousCount = 0;

            // تابع کمکی: گرفتن آرایه تمام URLهای عکس‌های موجود
            const getAllImageUrls = async () => {
              return await page.evaluate(() => {
                const imgs = document.querySelectorAll('img[src*="uploads.mangadex.org"]');
                return Array.from(imgs).map(img => img.src);
              });
            };

            while (true) {
              // صبر کن تا تعداد عکس‌ها بیشتر از دفعه قبل بشه (یعنی عکس جدید اضافه شده)
              try {
                await page.waitForFunction(
                  (prevCount) => {
                    return document.querySelectorAll('img[src*="uploads.mangadex.org"]').length > prevCount;
                  },
                  { timeout: 15000 },
                  previousCount
                );
              } catch (e) {
                // اگر تعداد عوض نشد، چپتر تموم شده
                console.log('No new images added. End of chapter.');
                break;
              }

              // همه عکس‌ها رو بگیر
              const allUrls = await getAllImageUrls();
              console.log(`Total images in DOM: ${allUrls.length}`);

              // اونایی که جدید هستن و دانلود نکردیم رو پیدا کن
              const newUrls = allUrls.filter(url => !downloaded.has(url));
              if (newUrls.length === 0) {
                console.log('All images already downloaded. Finished.');
                break;
              }

              // فقط **آخرین** عکس جدید رو دانلود کن (صفحه فعلی)
              // (اگر چندتا جدید اضافه شدن، آخرینشون صفحه مورد نظره)
              const currentUrl = newUrls[newUrls.length - 1];
              console.log('New page image:', currentUrl);

              // علامت‌گذاری که دانلود شده
              downloaded.add(currentUrl);

              // دانلود
              const imgPage = await browser.newPage();
              await imgPage.setUserAgent(page.browser().userAgent());
              await imgPage.setExtraHTTPHeaders({ Referer: 'https://mangadex.org/' });
              try {
                const response = await imgPage.goto(currentUrl, { timeout: 60000 });
                const buffer = await response.buffer();
                const filename = 'page_' + String(downloaded.size).padStart(3, '0') + '.jpg';
                fs.writeFileSync(saveDir + '/' + filename, buffer);
                console.log('  ✔ ' + filename);
              } catch (err) {
                console.error('  ✖ Download failed:', err.message);
                // حذف از Set تا در دور بعد دوباره تلاش کنه (احتیاطی)
                downloaded.delete(currentUrl);
              } finally {
                await imgPage.close();
              }

              // به روزرسانی شمارنده
              previousCount = allUrls.length;

              // برو صفحه بعد
              await page.keyboard.press('ArrowRight');
              // یه مکث کوچولو که reader واکنش نشون بده
              await wait(500);
            }

            await browser.close();
            console.log('Done. Files in', saveDir);
          })();
          EOF
          node capture.js

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manga_captures/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Capture manga chapter (paged) [skip ci]"
          git pull --rebase
          git push
