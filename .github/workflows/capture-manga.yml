name: 📖 MangaDex Chapter Download (API)
on:
  workflow_dispatch:
    inputs:
      chapter_url:
        description: 'لینک چپتر (مثلاً https://mangadex.org/chapter/...)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: دریافت اطلاعات و دانلود
        env:
          CHAPTER_URL: ${{ github.event.inputs.chapter_url }}
        run: |
          # 1. UUID از لینک
          CHAPTER_ID=$(echo "$CHAPTER_URL" | awk -F/ '{print $NF}')
          echo "Chapter ID: $CHAPTER_ID"

          ATHOME_URL="https://api.mangadex.org/at-home/server/$CHAPTER_ID"
          echo "Fetching: $ATHOME_URL"

          # 2. گرفتن پاسخ API (فقط کد HTTP برای بررسی اولیه)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$ATHOME_URL")
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ API returned status $HTTP_CODE. Check the chapter ID or try again later."
            exit 1
          fi

          # 3. استخراج اطلاعات با یک درخواست مستقیم curl -> jq
          #    بدون ذخیره در متغیرهای حجیم
          echo "Extracting image list..."

          # 4. گرفتن baseUrl و hash
          BASE_URL=$(curl -s "$ATHOME_URL" | jq -r '.baseUrl')
          CHAPTER_HASH=$(curl -s "$ATHOME_URL" | jq -r '.chapter.hash')

          if [ -z "$BASE_URL" ] || [ "$BASE_URL" = "null" ] || [ -z "$CHAPTER_HASH" ] || [ "$CHAPTER_HASH" = "null" ]; then
            echo "❌ Failed to parse baseUrl or hash from API response:"
            curl -s "$ATHOME_URL" | head -c 300
            exit 1
          fi

          echo "Base URL: $BASE_URL"
          echo "Hash: $CHAPTER_HASH"

          # 5. ذخیره لیست فایل‌ها در یک فایل موقت (لازم برای حلقه while)
          curl -s "$ATHOME_URL" | jq -r '.chapter.data[]' > pages.txt
          TOTAL=$(wc -l < pages.txt)

          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ No pages found in API response."
            exit 1
          fi

          echo "Number of pages: $TOTAL"

          # 6. پوشه خروجی
          FOLDER="manga_captures/$(echo "$CHAPTER_ID" | cut -c1-8)_$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$FOLDER"

          # 7. دانلود هر صفحه
          PAGE_NUM=0
          while IFS= read -r FILENAME; do
            PAGE_NUM=$((PAGE_NUM + 1))
            PAD_NUM=$(printf "%03d" $PAGE_NUM)
            IMAGE_URL="${BASE_URL}/data/${CHAPTER_HASH}/${FILENAME}"
            echo "[$PAGE_NUM/$TOTAL] Downloading: $IMAGE_URL"
            curl -s -L --retry 2 --max-time 60 -o "$FOLDER/page_$PAD_NUM.jpg" "$IMAGE_URL" || {
              echo "⚠️  Failed to download page $PAGE_NUM"
            }
          done < pages.txt

          echo "🎉 Done. Files in $FOLDER"
          echo "FOLDER=$FOLDER" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manga_captures/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Download chapter via API [skip ci]"
          git pull --rebase
          git push
