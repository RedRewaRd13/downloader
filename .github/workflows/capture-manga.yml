name: 📖 Capture Manga Chapter
on:
  workflow_dispatch:
    inputs:
      chapter_url:
        description: 'MangaDex chapter URL (با ?style=long-strip)'
        required: true

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Capture full-page screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 800, height: 1000 });
            await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');

            const url = process.env.CHAPTER_URL;
            console.log('Opening:', url);
            await page.goto(url, { waitUntil: 'networkidle2', timeout: 60000 });
            await page.waitForTimeout(3000);

            // Scroll slow to trigger lazy loading
            await page.evaluate(async () => {
              await new Promise(resolve => {
                let total = 0;
                const dist = 200;
                const timer = setInterval(() => {
                  window.scrollBy(0, dist);
                  total += dist;
                  if (total >= document.body.scrollHeight) {
                    clearInterval(timer);
                    resolve();
                  }
                }, 300);
              });
            });
            await page.waitForTimeout(4000);

            // Create folder
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').substring(0,19);
            const chapterSlug = process.env.CHAPTER_URL.replace(/[^a-zA-Z0-9]/g, '_').substring(0,50);
            const saveDir = 'manga_captures/' + chapterSlug + '_' + timestamp;
            fs.mkdirSync(saveDir, { recursive: true });

            // Take full-page screenshot (all pages as one tall image)
            await page.screenshot({ path: saveDir + '/full_chapter.png', fullPage: true });
            console.log('Screenshot saved to:', saveDir + '/full_chapter.png');

            // Also capture each individual page as separate screenshots (optional)
            const pageCount = await page.evaluate(() => {
              return document.querySelectorAll('img[src*=\"uploads.mangadex.org\"]').length;
            });
            console.log('Number of image elements:', pageCount);

            await browser.close();
          })();
          "
        env:
          CHAPTER_URL: ${{ github.event.inputs.chapter_url }}

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manga_captures/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Capture manga chapter [skip ci]"
          git pull --rebase
          git push
