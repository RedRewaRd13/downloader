name: 📖 MangaDex Chapter Download (API)
on:
  workflow_dispatch:
    inputs:
      chapter_url:
        description: 'لینک چپتر (مثلاً https://mangadex.org/chapter/...)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: دریافت لیست تصاویر و دانلود
        env:
          CHAPTER_URL: ${{ github.event.inputs.chapter_url }}
        run: |
          # 1. استخراج UUID چپتر
          CHAPTER_ID=$(echo "$CHAPTER_URL" | awk -F/ '{print $NF}')
          echo "Chapter ID: $CHAPTER_ID"

          # 2. گرفتن metadata از at-home server (baseUrl + hash + لیست فایل‌ها)
          ATHOME_URL="https://api.mangadex.org/at-home/server/$CHAPTER_ID"
          echo "Fetching image metadata from: $ATHOME_URL"
          METADATA=$(curl -s "$ATHOME_URL")

          # خطا اگر metadata خالی بود
          if [ -z "$METADATA" ]; then
            echo "❌ Failed to fetch image metadata"
            exit 1
          fi

          # استخراج baseUrl و hash و آرایه data (کیفیت اصلی)
          BASE_URL=$(echo "$METADATA" | jq -r '.baseUrl')
          CHAPTER_HASH=$(echo "$METADATA" | jq -r '.chapter.hash')

          # آرایه data رو به صورت خط‌به‌خط ذخیره می‌کنیم (روش امن برای jq 1.6)
          echo "$METADATA" | jq -r '.chapter.data[]' > pages.txt
          TOTAL=$(wc -l < pages.txt)

          if [ -z "$BASE_URL" ] || [ "$BASE_URL" = "null" ] || [ -z "$CHAPTER_HASH" ]; then
            echo "❌ Metadata incomplete. Response was:"
            echo "$METADATA" | head -c 500
            exit 1
          fi

          echo "Base URL: $BASE_URL"
          echo "Chapter hash: $CHAPTER_HASH"
          echo "Total pages: $TOTAL"

          # 3. ساخت پوشه خروجی
          FOLDER="manga_captures/$(echo "$CHAPTER_ID" | cut -c1-8)_$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$FOLDER"

          # 4. دانلود صفحه‌ها یکی‌یکی
          PAGE_NUM=0
          while IFS= read -r FILENAME; do
            PAGE_NUM=$((PAGE_NUM + 1))
            PAD_NUM=$(printf "%03d" $PAGE_NUM)
            IMAGE_URL="${BASE_URL}/data/${CHAPTER_HASH}/${FILENAME}"
            echo "[$PAGE_NUM/$TOTAL] Downloading: $IMAGE_URL"
            curl -L --retry 3 --max-time 60 -o "$FOLDER/page_$PAD_NUM.jpg" "$IMAGE_URL" || {
              echo "⚠️  Failed to download page $PAGE_NUM, continuing..."
            }
          done < pages.txt

          echo "🎉 Done. Files saved in $FOLDER"
          echo "FOLDER=$FOLDER" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manga_captures/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Download chapter via API [skip ci]"
          git pull --rebase
          git push
