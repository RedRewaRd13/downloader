name: 📖 MangaDex Chapter Download (API + ZIP)
on:
  workflow_dispatch:
    inputs:
      chapter_url:
        description: 'لینک چپتر (مثلاً https://mangadex.org/chapter/...)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: دریافت اطلاعات و دانلود
        env:
          CHAPTER_URL: ${{ github.event.inputs.chapter_url }}
        run: |
          CHAPTER_ID=$(echo "$CHAPTER_URL" | awk -F/ '{print $NF}')
          echo "Chapter ID: $CHAPTER_ID"

          ATHOME_URL="https://api.mangadex.org/at-home/server/$CHAPTER_ID"
          echo "Fetching: $ATHOME_URL"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$ATHOME_URL")
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ API returned status $HTTP_CODE."
            exit 1
          fi

          BASE_URL=$(curl -s "$ATHOME_URL" | jq -r '.baseUrl')
          CHAPTER_HASH=$(curl -s "$ATHOME_URL" | jq -r '.chapter.hash')

          if [ -z "$BASE_URL" ] || [ "$BASE_URL" = "null" ] || [ -z "$CHAPTER_HASH" ] || [ "$CHAPTER_HASH" = "null" ]; then
            echo "❌ Failed to parse metadata."
            exit 1
          fi

          curl -s "$ATHOME_URL" | jq -r '.chapter.data[]' > pages.txt
          TOTAL=$(wc -l < pages.txt)

          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ No pages found."
            exit 1
          fi

          echo "Base URL: $BASE_URL"
          echo "Hash: $CHAPTER_HASH"
          echo "Total pages: $TOTAL"

          FOLDER_NAME="$(echo "$CHAPTER_ID" | cut -c1-8)_$(date +%Y%m%d_%H%M%S)"
          FOLDER="manga_captures/$FOLDER_NAME"
          mkdir -p "$FOLDER"

          PAGE_NUM=0
          while IFS= read -r FILENAME; do
            PAGE_NUM=$((PAGE_NUM + 1))
            PAD_NUM=$(printf "%03d" $PAGE_NUM)
            IMAGE_URL="${BASE_URL}/data/${CHAPTER_HASH}/${FILENAME}"
            echo "[$PAGE_NUM/$TOTAL] Downloading: $IMAGE_URL"
            curl -s -L --retry 2 --max-time 60 -o "$FOLDER/page_$PAD_NUM.jpg" "$IMAGE_URL" || {
              echo "⚠️  Failed to download page $PAGE_NUM"
            }
          done < pages.txt

          echo "🎉 Pages saved to: $FOLDER"
          # ذخیره متغیرها برای مراحل بعد
          echo "FOLDER=$FOLDER" >> $GITHUB_ENV
          echo "FOLDER_NAME=$FOLDER_NAME" >> $GITHUB_ENV

      - name: ساخت فایل ZIP
        run: |
          cd manga_captures
          zip -r "${FOLDER_NAME}.zip" "$FOLDER_NAME"
          echo "✅ ZIP created: manga_captures/${FOLDER_NAME}.zip"
          cd ..

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manga_captures/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Download chapter + ZIP [skip ci]"
          git pull --rebase
          git push
